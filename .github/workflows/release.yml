name: Publish Release

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: pip install pyyaml requests

      - name: Create temporary Crowdin config
        run: bash scripts/create-crowdin-temp-config.sh

      - name: Backup English source lang
        run: bash scripts/backup-english-source-lang.sh

      - name: Upload source to Crowdin
        uses: crowdin/github-action@v2
        with:
          config: .crowdin-temp.yml
          upload_sources: true
          upload_translations: false
          download_translations: false
        env:
          CROWDIN_PROJECT_ID: ${{ secrets.CROWDIN_PROJECT_ID }}
          CROWDIN_PERSONAL_TOKEN: ${{ secrets.CROWDIN_PERSONAL_TOKEN }}

      - name: Download translations from Crowdin
        uses: crowdin/github-action@v2
        with:
          config: .crowdin-temp.yml
          upload_sources: false
          upload_translations: false
          download_translations: true
          skip_untranslated_files: false
          push_translations: false
          create_pull_request: false
        env:
          CROWDIN_PROJECT_ID: ${{ secrets.CROWDIN_PROJECT_ID }}
          CROWDIN_PERSONAL_TOKEN: ${{ secrets.CROWDIN_PERSONAL_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Cleanup Crowdin files and protect en_us
        run: bash scripts/cleanup-crowdin-files.sh

      - name: Normalize lang filenames
        run: bash scripts/normalize-lang-filenames.sh

      - name: Commit Crowdin translation updates
        run: bash scripts/commit-crowdin-translation-updates.sh

      - name: Read release metadata
        id: meta
        shell: bash
        run: python scripts/read-release-metadata.py

      - name: Build datapack zip and universal mod jar
        env:
          ZIP_NAME: ${{ steps.meta.outputs.zip_name }}
          JAR_NAME: ${{ steps.meta.outputs.jar_name }}
          VERSION_NUMBER: ${{ steps.meta.outputs.version_number }}
          PROJECT_ID: ${{ steps.meta.outputs.project_id }}
        run: python scripts/build-release-artifacts.py

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ steps.meta.outputs.tag_name }}
          RELEASE_NAME: ${{ steps.meta.outputs.release_name }}
          CHANGELOG_PATH: ${{ steps.meta.outputs.changelog_path }}
          ZIP_NAME: ${{ steps.meta.outputs.zip_name }}
          JAR_NAME: ${{ steps.meta.outputs.jar_name }}
          IS_PRERELEASE: ${{ steps.meta.outputs.is_prerelease }}
        run: bash scripts/create-or-update-github-release.sh

      - name: Upload datapack version to Modrinth
        env:
          MODRINTH_TOKEN: ${{ secrets.MODRINTH_TOKEN }}
          PROJECT_ID: ${{ steps.meta.outputs.project_id }}
          VERSION_NUMBER: ${{ steps.meta.outputs.version_number }}
          RELEASE_NAME: ${{ steps.meta.outputs.release_name }}
          VERSION_TYPE: ${{ steps.meta.outputs.version_type }}
          CHANGELOG_PATH: ${{ steps.meta.outputs.changelog_path }}
          GAME_VERSIONS_JSON: ${{ steps.meta.outputs.game_versions_json }}
          FILE_NAME: ${{ steps.meta.outputs.zip_name }}
          LOADERS_JSON: '["datapack"]'
          FILE_MIME_TYPE: application/zip
          MODRINTH_UPLOAD_LABEL: datapack
        run: python scripts/upload-version-to-modrinth.py

      - name: Upload universal mod version to Modrinth
        env:
          MODRINTH_TOKEN: ${{ secrets.MODRINTH_TOKEN }}
          PROJECT_ID: ${{ steps.meta.outputs.project_id }}
          VERSION_NUMBER: ${{ steps.meta.outputs.mod_version_number }}
          RELEASE_NAME: ${{ steps.meta.outputs.mod_release_name }}
          VERSION_TYPE: ${{ steps.meta.outputs.version_type }}
          CHANGELOG_PATH: ${{ steps.meta.outputs.changelog_path }}
          GAME_VERSIONS_JSON: ${{ steps.meta.outputs.game_versions_json }}
          FILE_NAME: ${{ steps.meta.outputs.jar_name }}
          LOADERS_JSON: '["fabric", "forge", "quilt", "neoforge"]'
          FILE_MIME_TYPE: application/java-archive
          MODRINTH_UPLOAD_LABEL: universal mod
        run: python scripts/upload-version-to-modrinth.py
